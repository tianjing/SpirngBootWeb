    if (isSSL) {
        wsstart = "wss";
    }
    var wsTextUrl = wsstart + "://" + url + "/myrest/websocket";
    var ws = null;
    var wstext = null;
    var postdata = {"password": "1", "username": "admin"};
    token=tgtools.net.postAjaxData("../../client/gettoken", postdata);

    var data={"token":token,"user":"admin","operation":"helloword","data":{"say":"im tg"}};

        wstext.send(JSON.stringify(data));
    };

    function webSocketText() {
        wstext = new WebSocket(wsTextUrl);
